name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate GitHub Readme Stats & Top Langs (via Docker)
        env:
          PAT_1: ${{ secrets.GH_PAT }}
        run: |
          # Start the Docker container mapping port 3000 (host) to 3000 (container)
          docker run -d -p 3000:3000 -e PAT_1="${PAT_1}" ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          echo "Waiting for Docker container to start..."
          # Loop to wait until the server responds with a 200 OK status
          timeout 30 bash -c 'until curl -s -f http://localhost:3000 > /dev/null; do sleep 2; done' || (echo "Server failed to start in time" && docker logs $(docker ps -q) && exit 1)
          
          echo "Container is up! Fetching SVGs..."
          
          # Use --fail to catch HTTP errors (like 500 or 404) and output them to the console
          curl --fail -s "http://localhost:3000/api?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false" > github-stats.svg
          curl --fail -s "http://localhost:3000/api/top-langs?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact&hide=shell,powershell,html,css&v=1" > top-langs.svg

      - name: Generate Streak Stats (via PHP)
        env:
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/DenverCoder1/github-readme-streak-stats.git /tmp/streak
          cd /tmp/streak
          composer install
          php -S localhost:8000 &
          
          echo "Waiting for PHP server to start..."
          # Loop to wait until the PHP server responds
          timeout 15 bash -c 'until curl -s http://localhost:8000 > /dev/null; do sleep 2; done'
          
          cd ${{ github.workspace }}
          
          echo "Fetching Streak Stats SVG..."
          curl --fail -s "http://localhost:8000/?user=oceanmallik&theme=dark&hide_border=false" > streak-stats.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg top-langs.svg streak-stats.svg
          
          git commit -m "chore: dynamically update github stats" || exit 0
          git push
