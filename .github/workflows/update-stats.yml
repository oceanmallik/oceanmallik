name: Update GitHub Stats

on:
  schedule:
    # Runs at minute 0 past every 6th hour (00:00, 06:00, 12:00, 18:00)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate GitHub Readme Stats & Top Langs
        env:
          PAT_1: ${{ secrets.GH_PAT }}
        run: |
          # Clone the official repo and start the local Node.js server
          git clone https://github.com/anuraghazra/github-readme-stats.git /tmp/ghrs
          cd /tmp/ghrs
          npm install
          npm start &
          
          # Wait for the server to boot
          sleep 10
          cd ${{ github.workspace }}
          
          # Fetch your specific Main Stats and Top Langs SVGs
          curl -s "http://localhost:3000/api?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false" > github-stats.svg
          curl -s "http://localhost:3000/api/top-langs/?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact&hide=shell,powershell,html,css&v=1" > top-langs.svg

      - name: Generate Streak Stats
        env:
          # The streak-stats repo specifically looks for 'TOKEN' instead of 'PAT_1'
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Clone the official streak stats repo and start the local PHP server
          git clone https://github.com/DenverCoder1/github-readme-streak-stats.git /tmp/streak
          cd /tmp/streak
          composer install
          php -S localhost:8000 &
          
          # Wait for the server to boot
          sleep 5
          cd ${{ github.workspace }}
          
          # Fetch your specific Streak Stats SVG
          curl -s "http://localhost:8000/?user=oceanmallik&theme=dark&hide_border=false" > streak-stats.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg top-langs.svg streak-stats.svg
          
          # Prevent the workflow from failing if there are no changes to commit
          git commit -m "chore: dynamically update github stats" || exit 0
          git push
