name: Update GitHub Stats

on:
  schedule:
    # Runs at minute 0 past every 6th hour
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate GitHub Readme Stats & Top Langs (via Docker)
        env:
          PAT_1: ${{ secrets.GH_PAT }}
        run: |
          # 1. Start the community-maintained Docker image (which perfectly mirrors the Vercel environment)
          docker run -d -p 9000:9000 -e PAT_1="${PAT_1}" ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          
          # 2. Wait for the container's node server to fully boot
          sleep 15
          
          # 3. Fetch your specific SVGs
          curl -s "http://localhost:9000/api?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false" > github-stats.svg
          curl -s "http://localhost:9000/api/top-langs?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact&hide=shell,powershell,html,css&v=1" > top-langs.svg

      - name: Generate Streak Stats (via PHP)
        env:
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. Clone the streak stats repo and start the local PHP server
          git clone https://github.com/DenverCoder1/github-readme-streak-stats.git /tmp/streak
          cd /tmp/streak
          composer install
          php -S localhost:8000 &
          
          # 2. Wait for the PHP server to boot
          sleep 5
          cd ${{ github.workspace }}
          
          # 3. Fetch your Streak Stats SVG
          curl -s "http://localhost:8000/?user=oceanmallik&theme=dark&hide_border=false" > streak-stats.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg top-langs.svg streak-stats.svg
          
          git commit -m "chore: dynamically update github stats" || exit 0
          git push
