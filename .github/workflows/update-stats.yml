name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    # THIS IS THE MAGIC LINE: It allows the bot to push the SVGs to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate GitHub Readme Stats & Top Langs (Locally)
        env:
          PAT_1: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git /tmp/ghrs
          cd /tmp/ghrs
          npm install
          
          PORT=3000 node express.js &
          
          echo "Waiting for Node server to boot..."
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done'
          
          cd ${{ github.workspace }}
          
          echo "Fetching Readme Stats and Top Langs..."
          curl --fail -s "http://localhost:3000/api?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false" > github-stats.svg
          curl --fail -s "http://localhost:3000/api/top-langs?username=oceanmallik&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact&hide=shell,powershell,html,css&v=1" > top-langs.svg

      - name: Fetch Streak Stats (From Public API)
        run: |
          echo "Fetching Streak Stats from the official demolab instance..."
          curl --fail -s "https://streak-stats.demolab.com/?user=oceanmallik&theme=dark&hide_border=false" > streak-stats.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add github-stats.svg top-langs.svg streak-stats.svg
          
          git commit -m "chore: dynamically update github stats" || exit 0
          git push
